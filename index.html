<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ECEAF2" />
  <title>Stickerly — 스티커 에디터</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Dongle:wght@400;700&family=Gaegu:wght@400;700&family=Inter:wght@400;500;600;700&family=Jua&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />
  <script src="https://unpkg.com/konva@9.3.18/konva.min.js"></script>
</head>
<body>
  <!-- ============ PROJECT LIST ============ -->
  <section id="screen-projects" class="screen is-active">
    <header class="topbar topbar--home">
      <div class="wordmark">Stickerly<span class="wordmark__dot">.</span></div>
      <button id="btn-new" class="btn btn--primary">새 프로젝트</button>
    </header>

    <main class="home">
      <div id="project-grid" class="project-grid"></div>
      <div id="empty-state" class="empty" hidden>
        <div class="empty__art">✦</div>
        <p class="empty__title">아직 프로젝트가 없어요</p>
        <p class="empty__hint">새 프로젝트를 만들어 스티커를 붙여보세요.</p>
      </div>
    </main>
  </section>

  <!-- ============ EDITOR ============ -->
  <section id="screen-editor" class="screen screen--editor">
    <header class="topbar topbar--editor">
      <button id="btn-back" class="iconbtn" aria-label="목록으로">‹</button>
      <input id="title-input" class="title-input" maxlength="40" />
      <div class="topbar__spacer"></div>
      <button id="btn-undo" class="iconbtn" aria-label="실행 취소" title="실행 취소">↶</button>
      <button id="btn-redo" class="iconbtn" aria-label="다시 실행" title="다시 실행">↷</button>
      <button id="btn-save" class="btn btn--ghost">저장</button>
      <button id="btn-export" class="btn btn--primary">PNG</button>
    </header>

    <div id="stage-wrap" class="stage-wrap">
      <div id="stage-host"></div>
      <div id="zoom-readout" class="zoom-readout">100%</div>
      <div id="sticker-menu" class="sticker-menu" hidden></div>
      <button id="bg-adjust-btn" class="canvas-bg-adjust" type="button"
        aria-label="배경 조정" title="배경 조정">▧</button>
    </div>

    <!-- sticker tray: tabbed between stickers and background -->
    <div class="tray">
      <div class="tray__tabs">
        <button id="tab-stickers" class="tray-tab is-on">스티커</button>
        <button id="tab-bg" class="tray-tab">배경</button>
        <button id="tab-text" class="tray-tab">텍스트</button>
      </div>

      <div id="panel-stickers" class="tray-panel">
        <div id="pack-carousel" class="sticker-pack-list"></div>
        <div id="sticker-pack-detail" class="sticker-pack-detail" hidden>
          <div class="sticker-pack-detail__header">
            <button id="sticker-pack-back" class="sticker-pack-back" type="button">‹ 스티커팩</button>
            <strong id="sticker-pack-title"></strong>
          </div>
          <div id="sticker-carousel" class="sticker-list"></div>
        </div>
      </div>

      <div id="panel-bg" class="tray-panel" hidden>
        <div id="bg-carousel" class="carousel carousel--bg"></div>
        <input id="bg-scroll" class="carousel-scroll" type="range" min="0" value="0" aria-label="배경 목록 이동" />
        <input id="bg-file" type="file" accept="image/*" hidden />
      </div>

      <div id="panel-text" class="tray-panel" hidden>
        <div id="text-carousel" class="carousel carousel--text">
          <div class="text-chip" data-font="Jua" style="font-family:Jua,sans-serif">말랑</div>
          <div class="text-chip" data-font="Gaegu" style="font-family:Gaegu,cursive">꼬물</div>
          <div class="text-chip" data-font="Dongle" style="font-family:Dongle,sans-serif">동글</div>
        </div>
        <input id="text-scroll" class="carousel-scroll" type="range" min="0" value="0" aria-label="글꼴 목록 이동" />
      </div>
    </div>

    <!-- ghost element that follows finger when dragging a sticker out of the tray -->
    <img id="drag-ghost" class="drag-ghost" alt="" hidden />
    <div id="text-drag-ghost" class="text-drag-ghost" hidden>텍스트</div>
    <button id="btn-toggle-ui" class="ui-toggle" type="button" aria-label="UI 숨기기" title="UI 숨기기">⌄</button>
  </section>

  <!-- ============ NEW PROJECT MODAL ============ -->
  <div id="modal-new" class="modal" hidden>
    <div class="modal__card">
      <h2 class="modal__title">새 프로젝트</h2>
      <label class="field">
        <span class="field__label">이름</span>
        <input id="new-title" class="field__input" placeholder="제목 없는 프로젝트" maxlength="40" />
      </label>
      <span class="field__label">배경을 골라주세요</span>
      <div id="new-background-grid" class="new-background-grid"></div>
      <div class="modal__actions">
        <button id="new-cancel" class="btn btn--ghost">취소</button>
        <button id="new-create" class="btn btn--primary">만들기</button>
      </div>
    </div>
  </div>

  <!-- ============ RENAME / CONFIRM (lightweight) ============ -->
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
