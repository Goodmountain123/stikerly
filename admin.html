<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#ff72a6">
  <title>Stickerly 관리자</title>
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <main class="admin">
    <header class="admin__header">
      <div><h1>Stickerly 관리자</h1><p>스티커와 배경을 관리해요.</p></div>
      <button id="logout" class="button secondary" hidden>로그아웃</button>
    </header>

    <section id="setup" class="notice" hidden>
      <strong>Supabase 연결이 필요해요.</strong>
      <span><code>js/supabase-config.js</code>에 URL과 anon key를 입력하세요.</span>
    </section>

    <section id="login" class="panel">
      <h2>관리자 로그인</h2>
      <form id="login-form" class="form">
        <input id="email" type="email" placeholder="이메일" required>
        <input id="password" type="password" placeholder="비밀번호" required>
        <button class="button">로그인</button>
      </form>
    </section>

    <section id="dashboard" hidden>
      <nav class="tabs">
        <button class="tab is-on" data-tab="packs">스티커팩</button>
        <button class="tab" data-tab="backgrounds">배경</button>
      </nav>

      <section id="packs-panel">
        <form id="pack-form" class="add-row">
          <input id="pack-name" placeholder="새 스티커팩 이름" required>
          <button class="button">팩 추가</button>
        </form>
        <div id="pack-list" class="list"></div>
      </section>

      <section id="backgrounds-panel" hidden>
        <form id="background-form" class="add-row">
          <input id="background-name" placeholder="배경 이름" required>
          <input id="background-file" type="file" accept="image/*" required>
          <button class="button">배경 추가</button>
        </form>
        <div id="background-list" class="grid"></div>
      </section>
    </section>
  </main>
  <div id="toast" class="toast" hidden></div>
  <script type="module" src="./js/admin.js"></script>
</body>
</html>
